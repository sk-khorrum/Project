    <script>
        // Updated Tools Data with Bengali
        const tools = [
            { id: 'merge', icon: 'fa-object-group', titleEn: 'Merge PDF', titleBn: 'পিডিএফ মার্জ', descEn: 'Combine multiple PDFs', descBn: 'একাধিক পিডিএফ যুক্ত করুন', accept: '.pdf', multiple: true },
            { id: 'split', icon: 'fa-scissors', titleEn: 'Split PDF', titleBn: 'পিডিএফ স্প্লিট', descEn: 'Split PDF pages', descBn: 'পিডিএফ পেজ আলাদা করুন', accept: '.pdf', multiple: false },
            { id: 'compress', icon: 'fa-compress', titleEn: 'Compress PDF', titleBn: 'সাইজ কমান', descEn: 'Reduce file size', descBn: 'পিডিএফ ফাইল ছোট করুন', accept: '.pdf', multiple: false },
            { id: 'pdf-to-images', icon: 'fa-images', titleEn: 'PDF to Images', titleBn: 'পিডিএফ থেকে ইমেজ', descEn: 'Convert to PNG/JPG', descBn: 'পেজগুলোকে ছবি হিসেবে সেভ করুন', accept: '.pdf', multiple: false },
            { id: 'images-to-pdf', icon: 'fa-file-image', titleEn: 'Images to PDF', titleBn: 'ইমেজ থেকে পিডিএফ', descEn: 'Create PDF from images', descBn: 'ছবি দিয়ে পিডিএফ তৈরি করুন', accept: 'image/*', multiple: true },
            { id: 'protect', icon: 'fa-lock', titleEn: 'Protect PDF', titleBn: 'পাসওয়ার্ড দিন', descEn: 'Add password', descBn: 'পিডিএফ এ লক সেট করুন', accept: '.pdf', multiple: false }
        ];

        let currentLanguage = 'en';

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <div class="tool-card" onclick="openTool('${tool.id}')">
                    <i class="fas ${tool.icon} tool-icon"></i>
                    <h3 data-en="${tool.titleEn}" data-bn="${tool.titleBn}">${tool.titleEn}</h3>
                    <p data-en="${tool.descEn}" data-bn="${tool.descBn}">${tool.descEn}</p>
                </div>
            `).join('');
        }

        function toggleLanguage() {
            const toggle = document.getElementById('languageToggle');
            toggle.classList.toggle('active');
            currentLanguage = currentLanguage === 'en' ? 'bn' : 'en';
            updateLanguageUI();
        }

        function updateLanguageUI() {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = currentLanguage === 'bn' ? el.getAttribute('data-bn') : el.getAttribute('data-en');
            });
        }

        // Logic Initialization
        document.getElementById('languageToggle').addEventListener('click', toggleLanguage);
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeToggle').classList.toggle('active');
        });
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
            document.getElementById('menuToggle').classList.toggle('active');
        });

        // Basic Modal Functions (Linking to your existing PDF logic)
        function openTool(id) {
            const tool = tools.find(t => t.id === id);
            document.getElementById('modalTitle').textContent = currentLanguage === 'bn' ? tool.titleBn : tool.titleEn;
            document.getElementById('modal').classList.add('active');
            document.getElementById('fileInput').accept = tool.accept;
            document.getElementById('fileInput').multiple = tool.multiple;
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('processBtn').disabled = false;
        };

        window.onload = () => { renderTools(); updateLanguageUI(); };
    </script>
