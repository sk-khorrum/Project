<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-light: #f0f4f8;
            --bg-dark: #1a1a2e;
            --text-light: #1f2937;
            --text-dark: #f9fafb;
            --shadow-color: rgba(99, 102, 241, 0.3);
            --card-bg-light: #ffffff;
            --card-bg-dark: #16213e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            overflow-x: hidden;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                rgba(99, 102, 241, 0.1) 0%,
                rgba(236, 72, 153, 0.1) 25%,
                rgba(139, 92, 246, 0.1) 50%,
                rgba(16, 185, 129, 0.1) 75%,
                rgba(99, 102, 241, 0.1) 100%
            );
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-5%, 5%) rotate(90deg); }
            50% { transform: translate(-10%, 0%) rotate(180deg); }
            75% { transform: translate(-5%, -5%) rotate(270deg); }
        }

        /* Header */
        header {
            background: var(--card-bg-light);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        body.dark-mode header {
            background: var(--card-bg-dark);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hamburger Menu */
        .menu-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1001;
        }

        .menu-toggle span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .menu-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        /* Sidebar Menu */
        .sidebar {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: var(--card-bg-light);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            padding: 80px 30px 30px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: var(--card-bg-dark);
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-section {
            margin-bottom: 30px;
        }

        .menu-section h3 {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            background: var(--bg-light);
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.1),
                        -5px -5px 15px rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        body.dark-mode .menu-item {
            background: var(--bg-dark);
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3),
                        -5px -5px 15px rgba(255, 255, 255, 0.05);
        }

        .menu-item:hover {
            transform: translateY(-2px);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #ccc;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch.active::before {
            left: 27px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            background: var(--bg-light);
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.1),
                        -5px -5px 15px rgba(255, 255, 255, 0.7);
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        body.dark-mode .social-link {
            background: var(--bg-dark);
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3),
                        -5px -5px 15px rgba(255, 255, 255, 0.05);
            color: var(--text-dark);
        }

        .social-link:hover {
            transform: translateX(-5px);
        }

        .social-link i {
            font-size: 1.3rem;
        }

        /* Container & Tools */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .tool-card {
            background: var(--card-bg-light);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.1), -10px -10px 30px rgba(255, 255, 255, 0.7);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        body.dark-mode .tool-card {
            background: var(--card-bg-dark);
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tool-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Modal & Upload Area styles remain exactly the same as your original */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 2000; justify-content: center; align-items: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg-light); padding: 2rem; border-radius: 25px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
        body.dark-mode .modal-content { background: var(--card-bg-dark); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--danger); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .upload-area { border: 3px dashed var(--primary); border-radius: 20px; padding: 3rem 2rem; text-align: center; cursor: pointer; }
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; justify-content: center; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--success); color: white; }
        
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            background: var(--card-bg-light);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode footer { background: var(--card-bg-dark); }
        footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header>
        <div class="logo">
            <i class="fas fa-file-pdf"></i>
            <span data-en="PDF Tools" data-bn="পিডিএফ টুলস">PDF Tools</span>
        </div>
        <button class="menu-toggle" id="menuToggle">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="menu-section">
            <h3 data-en="Settings" data-bn="সেটিংস">Settings</h3>
            <div class="menu-item">
                <span data-en="Language" data-bn="ভাষা">Language</span>
                <div class="toggle-switch" id="languageToggle">
                    <span style="position: absolute; left: 5px; font-size: 10px; color: white;">EN</span>
                    <span style="position: absolute; right: 5px; font-size: 10px; color: white;">BN</span>
                </div>
            </div>
            <div class="menu-item">
                <span data-en="Theme" data-bn="থিম">Theme</span>
                <div class="toggle-switch" id="themeToggle"></div>
            </div>
        </div>

        <div class="menu-section">
            <h3 data-en="Connect" data-bn="যোগাযোগ">Connect</h3>
            <a href="https://sk-khorrum-ceo.vercel.app/" target="_blank" class="social-link">
                <i class="fas fa-user-circle" style="color: var(--primary);"></i>
                <div>
                    <div style="font-weight: 600;">SK Khorrum</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">View Portfolio</div>
                </div>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1 data-en="All-in-One PDF Tools" data-bn="অল-ইন-ওয়ান পিডিএফ টুলস">All-in-One PDF Tools</h1>
            <p data-en="Professional PDF solutions - Fast, Secure & Free!" data-bn="প্রফেশনাল পিডিএফ সমাধান - দ্রুত, নিরাপদ এবং ফ্রি!">Professional PDF solutions - Fast, Secure & Free!</p>
        </div>
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 id="modalTitle" style="margin-bottom: 1rem;">PDF Tool</h2>
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--primary);"></i>
                <h3 data-en="Click or Drag files here" data-bn="এখানে ক্লিক করুন বা ফাইলটি টেনে আনুন">Click or Drag files here</h3>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            <div id="filePreview"></div>
            <div id="optionsSection"></div>
            <div id="progressContainer" style="display: none; margin-top: 1rem;">
                <div style="width: 100%; background: #eee; height: 10px; border-radius: 5px;">
                    <div id="progressFill" style="width: 0%; height: 100%; background: var(--primary); border-radius: 5px;"></div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="processBtn" onclick="processFiles()" disabled>Process</button>
                <button class="btn btn-secondary" id="downloadBtn" onclick="downloadResult()" style="display: none;">Download</button>
            </div>
        </div>
    </div>

    <footer>
        <p data-en="Created with ❤️ by" data-bn="❤️ দিয়ে তৈরি করেছেন">Created with ❤️ by</p>
        <a href="https://sk-khorrum-ceo.vercel.app/" target="_blank">SK Khorrum</a>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">All Rights Reserved © 2026</p>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const tools = [
            { id: 'merge', icon: 'fa-object-group', titleEn: 'Merge PDF', titleBn: 'পিডিএফ যুক্ত করুন', accept: '.pdf', multiple: true },
            { id: 'split', icon: 'fa-scissors', titleEn: 'Split PDF', titleBn: 'পিডিএফ বিভক্ত করুন', accept: '.pdf', multiple: false },
            { id: 'compress', icon: 'fa-compress', titleEn: 'Compress PDF', titleBn: 'সাইজ কমান', accept: '.pdf', multiple: false },
            { id: 'pdf-to-images', icon: 'fa-images', titleEn: 'PDF to Images', titleBn: 'পিডিএফ থেকে ইমেজ', accept: '.pdf', multiple: false },
            { id: 'images-to-pdf', icon: 'fa-file-image', titleEn: 'Images to PDF', titleBn: 'ইমেজ থেকে পিডিএফ', accept: 'image/*', multiple: true },
            { id: 'watermark', icon: 'fa-stamp', titleEn: 'Add Watermark', titleBn: 'ওয়াটারমার্ক যোগ করুন', accept: '.pdf', multiple: false }
        ];

        let currentTool = null;
        let uploadedFiles = [];
        let processedResult = null;
        let currentLanguage = 'en';

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <div class="tool-card" onclick="openTool('${tool.id}')">
                    <div class="tool-icon"><i class="fas ${tool.icon}"></i></div>
                    <h3 data-en="${tool.titleEn}" data-bn="${tool.titleBn}">${currentLanguage === 'en' ? tool.titleEn : tool.titleBn}</h3>
                </div>
            `).join('');
        }

        function openTool(id) {
            currentTool = tools.find(t => t.id === id);
            document.getElementById('modalTitle').textContent = currentLanguage === 'en' ? currentTool.titleEn : currentTool.titleBn;
            document.getElementById('fileInput').accept = currentTool.accept;
            document.getElementById('fileInput').multiple = currentTool.multiple;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            uploadedFiles = [];
            document.getElementById('filePreview').innerHTML = '';
        }

        // Logic for Language Toggle
        document.getElementById('languageToggle').onclick = function() {
            this.classList.toggle('active');
            currentLanguage = currentLanguage === 'en' ? 'bn' : 'en';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = currentLanguage === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-bn');
            });
            renderTools();
        };

        // UI & Sidebar Logic
        document.getElementById('menuToggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('menuToggle').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        };

        document.getElementById('themeToggle').onclick = function() {
            this.classList.toggle('active');
            document.body.classList.toggle('dark-mode');
        };

        // File Input Logic
        document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            uploadedFiles = Array.from(e.target.files);
            document.getElementById('filePreview').innerHTML = uploadedFiles.map(f => `<li>${f.name}</li>`).join('');
            document.getElementById('processBtn').disabled = false;
        };

        // [Apnar original PDF-lib ebong PDF.js er logic gulo ekhane thakbe]
        async function processFiles() {
            const btn = document.getElementById('processBtn');
            btn.innerHTML = "Processing...";
            // Example for Merge (simplifying for demo, you can paste your full original logic here)
            if(currentTool.id === 'merge') {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();
                for (const f of uploadedFiles) {
                    const doc = await PDFDocument.load(await f.arrayBuffer());
                    const pages = await mergedPdf.copyPages(doc, doc.getPageIndices());
                    pages.forEach(p => mergedPdf.addPage(p));
                }
                const bytes = await mergedPdf.save();
                processedResult = new Blob([bytes], {type: 'application/pdf'});
                document.getElementById('downloadBtn').style.display = 'block';
                btn.innerHTML = "Done!";
            }
        }

        function downloadResult() {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(processedResult);
            link.download = "processed.pdf";
            link.click();
        }

        window.onload = renderTools;
    </script>
</body>
</html>
